sets/index-hIIcqIRQ.css"></head><body><div id="root"></div><script>// Build-version based cache update check.
      // Fetches /version.json with no-store before app boot. If server version
      // differs from locally remembered version, force-load a unique URL to get
      // fresh HTML + latest hashed bundles.
      (async function ensureLatestVersion() {
        try {
          var KEY = '__site_version';
          var u = new URL(window.location.href);

          // If we just navigated with cache-busting, clean URL and continue.
          if (u.searchParams.has('_v')) {
            u.searchParams.delete('_v');
            window.history.replaceState({}, '', u.toString());
          }

          var base = '/';
          var response = await fetch(base + 'version.json?v=' + Date.now(), { cache: 'no-store' });
          if (!response.ok) return;

          var data = await response.json();
          var latest = String((data && data.version) || '');
          if (!latest) return;

          var current = localStorage.getItem(KEY);
          if (!current) {
            localStorage.setItem(KEY, latest);
            return;
          }

          if (current !== latest) {
            localStorage.setItem(KEY, latest);
            var fresh = new URL(window.location.href);
            fresh.searchParams.set('_v', latest);
            window.location.replace(fresh.toString());
          }
        } catch (_) {
          // Storage APIs unavailable or blocked: fall back to /latest/ route,
          // which always redirects to a unique root URL and breaks stale cache.
          if (window.location.pathname !== '/latest/' && window.location.pathname !== '/latest/index.html') {
            window.location.replace('/latest/?_v=' + Date.now());
          }
        }
      })();</script></body></html>
